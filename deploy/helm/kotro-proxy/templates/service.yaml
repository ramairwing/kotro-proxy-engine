apiVersion: v1
kind: Service
metadata:
  name: {{ include "kotro-proxy.fullname" . }}
  labels:
    {{- include "kotro-proxy.selectorLabels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http-proxy
      protocol: TCP
      name: http-proxy
    - port: {{ .Values.service.metricsPort }}
      targetPort: http-metrics
      protocol: TCP
      name: http-metrics
  selector:
    {{- include "kotro-proxy.selectorLabels" . | nindent 4 }}
