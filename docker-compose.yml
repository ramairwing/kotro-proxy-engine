version: '3.8'

services:
  mock-upstream:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./mock-upstream"]
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:9000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  kotro-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./kotro-proxy"]
    ports:
      - "8080:8080"
    depends_on:
      - mock-upstream
    environment:
      KOTRO_LISTEN_ADDR: ":8080"
      KOTRO_UPSTREAM_URL: "http://mock-upstream:9000"
      KOTRO_CACHE_DB: "/root/data/kotro-cache.db"
      KOTRO_CACHE_TTL: "24h"
      KOTRO_EVICTION_INTERVAL: "10m"
      KOTRO_ENABLE_CACHE: "true"
      KOTRO_ENABLE_REDACTION: "true"
      KOTRO_ENABLE_COMPRESSION: "true"
      RUST_LOG: "info"
    volumes:
      - kotro-cache-data:/root/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  kotro-cache-data:
