version: '3.8'

services:
  mock-upstream:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./mock-upstream"]
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:9000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  korto-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./korto-proxy"]
    ports:
      - "8080:8080"
    depends_on:
      - mock-upstream
    environment:
      KORTO_LISTEN_ADDR: ":8080"
      KORTO_UPSTREAM_URL: "http://mock-upstream:9000"
      KORTO_CACHE_DB: "/root/data/kortolabs-cache.db"
      KORTO_CACHE_TTL: "24h"
      KORTO_EVICTION_INTERVAL: "10m"
      KORTO_ENABLE_CACHE: "true"
      KORTO_ENABLE_REDACTION: "true"
      KORTO_ENABLE_COMPRESSION: "true"
      RUST_LOG: "info"
    volumes:
      - korto-cache-data:/root/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  korto-cache-data:
